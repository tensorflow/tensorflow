name: CI

on:
  pull_request:
    branches:
      - master
      - r2.**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  # Don't cancel in-progress jobs for master branches.
  cancel-in-progress: ${{ github.ref != 'master' }}

jobs:
  api-compat-py314-windows:
    name: py314-api-compat
    runs-on: windows-x86-n2-16
    timeout-minutes: 300
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout API compatibility branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        env:
          GIT_CONFIG_PARAMETERS: "'checkout.workers=12' 'core.featureManyFiles=true'"
        with:
          repository: vladbelit/tensorflow
          ref: vladbelit/api-compat-runtime-normalization
          persist-credentials: false
          fetch-depth: 1

      - name: Run Python 3.14 API compatibility test
        env:
          TFCI: py314,windows_x86_ml_actions,rbe
          TFCI_GITHUB_ACTIONS: true
        run: |
          bash -eo pipefail -c '
            source ./ci/official/utilities/setup.sh
            tfrun bazel $TFCI_BAZEL_BAZELRC_ARGS test \
              $TFCI_BAZEL_COMMON_ARGS \
              --noenable_runfiles \
              --nobuild_runfile_links \
              --test_output=errors \
              --verbose_failures \
              //tensorflow/tools/api/tests:api_compatibility_test
          ' ./ci/official/pycpp.sh

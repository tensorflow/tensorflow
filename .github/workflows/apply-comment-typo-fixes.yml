name: Apply comment typo fixes
on:
  push:
    branches: [docs/fix-comment-typos]
permissions:
  contents: write
jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct spelling
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tensorflow/compiler/mlir/tf2xla/transforms/legalize_tf.cc')
          text = path.read_text()
          replacements = {
              'num_interations': 'num_iterations',
              'since pasing any number': 'since passing any number',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected typo not found: {old}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
          rm .github/workflows/apply-comment-typo-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tensorflow/compiler/mlir/tf2xla/transforms/legalize_tf.cc .github/workflows/apply-comment-typo-fixes.yml
          git commit -m "docs: fix typos in TF to XLA comments"
          git push

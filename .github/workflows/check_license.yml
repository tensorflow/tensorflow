name: License Check

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  license-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    timeout-minutes: 10
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: "Set up Go"
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 'stable'
      - name: "Run license check"
        uses: google-ml-infra/actions/ci_check_license@432d36c6ac62d76fa99b3679758ccfbc10140fb6
        with:
          copyright-holder: 'The TensorFlow Authors'
          license-type: 'apache'
          exclude-paths: 'third_party'
          exclude-files: >-
            tensorflow_issue_template.yaml
            BUILD
            _redirects.yaml
            cloudbuild.yaml
            _index.yaml
            _book.yaml
            _toc.yaml
            _doxygen.yaml
          exclude-extensions: 'gradle'
name: Cumprod gradient focused test

on:
  push:
    branches:
      - fix-cumprod-zero-gradient-119430
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install basic deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv openjdk-21-jdk curl unzip zip build-essential

      - name: Install Bazelisk
        run: |
          curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o bazel
          chmod +x bazel
          sudo mv bazel /usr/local/bin/bazel
          bazel version

      - name: Configure TensorFlow
        run: |
          export PYTHON_BIN_PATH="$(which python3)"
          export USE_DEFAULT_PYTHON_LIB_PATH=1
          export TF_NEED_CUDA=0
          python3 configure.py

      - name: Check line endings and syntax
        run: |
          git diff --check
          python3 -m py_compile tensorflow/python/ops/math_grad.py tensorflow/python/ops/math_grad_test.py

      - name: Run focused Cumprod gradient tests
        run: |
          PYVER=$(python3 -c 'import sys; print(f"{sys.version_info.major}.{sys.version_info.minor}")')
          bazel test --repo_env=TF_PYTHON_VERSION="$PYVER" //tensorflow/python/ops:math_grad_test --test_filter=Cumprod --test_output=errors

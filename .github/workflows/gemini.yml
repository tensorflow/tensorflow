name: Gemini PR Review

on:
  pull_request:
    # Step 2: Enable this on PR creation later (Commented out for now)
    # types: [opened, synchronize]
    
    # Step 1: Trigger only when a label is added
    types: [labeled]

permissions:
  pull-requests: write
  contents: read

jobs:
  gemini-review:
    # Only run this job if the exact label added is "Needs Review"
    if: github.event.label.name == 'Needs Review'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gemini Code Assist
        uses: google-github-actions/gemini-code-assist@v1
        with:
          styleguide_path: '.gemini/styleguide.md'

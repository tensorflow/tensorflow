syntax = "proto3";

package xla.split_proto_cli;

import "xla/pjrt/proto/compile_options.proto";
import "xla/service/gpu/gpu_executable.proto";

option java_outer_classname = "SplitProtoCli";
option java_multiple_files = true;

// AOT binaries consist of a ExecutableAndOptionsProto serialized using Split
// Proto, with a serialized GpuExecutableProto (also using Split Proto) stored
// in the `serialized_executable` field of the options.
//
// This proto combines both protos into a single proto, so that you can inspect,
// and edit the AOT binary in a single file, that you can re-pack into a new AOT
// binary.
message DeserializedSplitExecutableAndOptions {
  // The serialized_executable field of this proto is not populated.
  ExecutableAndOptionsProto executable_and_options = 1;
  gpu.GpuExecutableProto gpu_executable = 2;
}
